services:
  postgres:
    image: postgres:16-alpine
    container_name: domino-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: domino
      POSTGRES_USER: domino
      POSTGRES_PASSWORD: domino
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U domino -d domino"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
